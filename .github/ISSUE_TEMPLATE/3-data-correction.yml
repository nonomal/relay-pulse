name: 数据纠错 / 申诉
description: "针对 RelayPulse 展示的监测数据、状态或标记提出纠错或申诉（响应目标：48 小时）"
title: "[纠错/申诉] <服务名称/域名> - <简要说明>"
labels: ["appeal", "data-correction", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 处理目标
        我们的目标是在 **48 小时内**对本申诉进行响应（确认受理、补充材料请求或初步结论）。节假日或高峰期可能延迟。

        ## 重要说明
        - RelayPulse 为自动化技术监测与信息展示工具；展示结果可能存在误差或延迟，不构成任何法律结论或官方认定。
        - 请勿在此提交任何敏感信息（如 API Key、密码、未公开的个人信息）。
        - 如需**下架/隐藏展示**，请使用 [服务商下架申请](https://github.com/prehisle/relay-pulse/issues/new?template=4-delist-request.yml) 模板。

  - type: input
    id: service_name
    attributes:
      label: 服务商/项目名称
      placeholder: "例如：ExampleCloud / example.com"
    validations:
      required: true

  - type: dropdown
    id: request_type
    attributes:
      label: 申诉类型
      options:
        - 数据错误
        - 状态误判
        - 标记/分类不准确
        - 其他
    validations:
      required: true

  - type: textarea
    id: affected_pages
    attributes:
      label: 受影响页面/条目
      description: 请提供 RelayPulse 内的链接、截图或条目标识（ID/名称/URL）。
      placeholder: |
        - 链接:
        - 条目 ID:
    validations:
      required: true

  - type: textarea
    id: claim
    attributes:
      label: 具体问题描述
      description: 请说明"当前展示是什么""你认为正确的应该是什么"，并给出理由。
      placeholder: |
        当前展示:
        期望更正:
        理由:
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 证明材料
      description: 请提供可公开验证的证据（如官方公告链接、公开文档、可验证的 DNS/HTTP 响应等）。
      placeholder: |
        - 官方链接:
        - 公开文档:
        - 其他:
    validations:
      required: false

  - type: input
    id: contact
    attributes:
      label: 联系方式（可选）
      description: 可选。QQ 号或其他联系方式；不要填写 API Key/密码。
      placeholder: "QQ号 / GitHub用户名"
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: 确认
      options:
        - label: 我确认提交内容不包含任何 API Key、密码或其他敏感信息
          required: true
        - label: 我理解 RelayPulse 的展示为自动化监测结果，不构成法律结论或官方认定
          required: true
