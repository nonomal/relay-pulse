name: 📋 申请收录
description: 申请将服务商接入监测
title: "[申请收录] 中转服务商名称"
labels: ["enhancement", "provider-suggestion"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您申请收录服务商！

        ⏱️ **处理流程**：
        1. 我们会在 3 个工作日内审核配置
        2. 如有问题会在 Issue 中联系您联调
        3. 配置验证通过后上线监测

        **重要**：请勿在此填写真实 API Key，提交后通过 QQ（18058344）单独发送。

        ✅ **必须完成**：提交前请先使用 [API 自助测试](https://relaypulse.top/selftest) 验证端点可用性，确认返回结果包含预期关键字（如 "pong"）。未通过自助测试的申请将不予受理。

        💎 **赞助等级**：不同等级对应不同的监测频率与权益，详见 [赞助权益体系](https://github.com/prehisle/relay-pulse/blob/main/docs/user/sponsorship.md)。

  - type: input
    id: provider-name
    attributes:
      label: 服务商名称
      description: 请提供服务商的正式名称
      placeholder: 例如：DeepSeek、Moonshot AI
    validations:
      required: true

  - type: dropdown
    id: sponsor_level
    attributes:
      label: 赞助等级（sponsor_level）
      description: 请选择对应的赞助等级，详见赞助权益体系文档
      options:
        - 公益 - 公益链路（public）
        - 商业 - 信号链路（signal）- 个人key适用
        - 商业 - 脉冲链路（pulse）— 默认等级
        - 商业 - 信标链路（beacon）
        - 商业 - 骨干链路（backbone）
        - 商业 - 核心链路（core）
      default: 2
    validations:
      required: true

  - type: textarea
    id: monitor-config-template
    attributes:
      label: 监测接入配置模板（必填）
      description: >
        请按下面的模板提供一份完整的监测配置（不要在此处填写真实 API Key）。
        填写完成并提交 Issue 后，请务必通过 QQ 单独发送真实 API Key：
        - QQ：18058344
      render: yaml
      value: |
        # ----------------------------------------------------------------
        # 请直接在此模板上修改 [] 中的内容，保留引号。
        # ----------------------------------------------------------------
        - provider: "[服务商名称]"                  # [必填] 例如：DeepSeek, FoxCode
          provider_url: "[服务商官网]"              # [选填] 用于展示来源

          sponsor: "[赞助者名称]"                   # [必填] 你的名字或组织名
          sponsor_url: "[赞助者链接]"               # [选填] 点击名字跳转的地址 (如 linux.do 帖子)

          category: "commercial"                   # [必填] commercial(商业) 或 public(公益)

          service: "cc"                            # [必填] 服务类型: cc (Claude), cx (Codex), gm (Gemini)

          # [必填] 通道标识，格式：渠道类型-渠道来源简写
          # O = 官方渠道 | R = 逆向渠道 | M = 混合渠道（默认，不确定时选此项）
          # 官方来源简写：Web / API / AWS / GCP / App
          # 示例：O-API, O-Web, R-自定义, M-自定义
          # 详见：https://github.com/prehisle/relay-pulse/blob/main/docs/user/sponsorship.md#22-通道命名规范
          channel: "M-[简写]"

          # [必填] 实际调用的 API Key
          # 此处可使用 sk-xxxx... 掩码，真实 Key 请通过 QQ 提供
          api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

          # [必填] 接口地址 (注意区分 cc/cx/gm 的后缀)
          # cc → /v1/messages | cx → /v1/responses | gm → /v1beta/models/{model}:streamGenerateContent?alt=sse
          url: "https://api.example.com/v1/messages"
    validations:
      required: true

  - type: checkboxes
    id: confirm-key
    attributes:
      label: 确认事项
      description: 请确认以下事项后再提交 Issue
      options:
        - label: 我不会在 Issue 中填写真实 API Key
          required: true
        - label: 我会在提交 Issue 后，通过 QQ（18058344）单独发送真实 API Key，并注明本 Issue 链接
          required: true
        - label: 我已通过 [API 自助测试](https://relaypulse.top/selftest) 验证端点可用性
          required: true
        - label: 我同意所提供的 API Key 将基于监测目的使用，包括但不限于可用性监测（连通性、延迟）和深度质量检测
          required: true

  - type: textarea
    id: additional-info
    attributes:
      label: 其他信息
      description: 其他任何想补充的信息
