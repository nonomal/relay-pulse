name: 📋 申请收录
description: 申请将服务商接入监测
title: "[申请收录] 中转服务商名称"
labels: ["enhancement", "provider-suggestion"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您申请收录服务商！

        ⏱️ **处理流程**：
        1. 我们会在 3 个工作日内审核配置
        2. 如有问题会在 Issue 中联系您联调
        3. 配置验证通过后上线监测

        📧 **重要**：请勿在此填写真实 API Key，提交后通过邮件单独发送。

        ✅ **提交前建议**：建议先使用 [API 自助测试](/selftest) 验证端点可用性，确认返回结果包含预期关键字（如 "pong"）。

        💎 **赞助等级**：不同等级对应不同的监测频率与权益，详见 [赞助权益体系](https://github.com/prehisle/relay-pulse/blob/main/docs/user/sponsorship.md)。

  - type: input
    id: provider-name
    attributes:
      label: 服务商名称
      description: 请提供服务商的正式名称
      placeholder: 例如：DeepSeek、Moonshot AI
    validations:
      required: true

  - type: dropdown
    id: sponsor_level
    attributes:
      label: 赞助等级（sponsor_level）
      description: 请选择对应的赞助等级，详见赞助权益体系文档
      options:
        - 公益 - 公益链路（public）
        - 商业 - 信号链路（signal）
        - 商业 - 脉冲链路（pulse）— 默认等级
        - 商业 - 信标链路（beacon）
        - 商业 - 骨干链路（backbone）
        - 商业 - 核心链路（core）
      default: 2
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 申请理由
      description: 简要说明申请收录的原因（可选）
      placeholder: 例如：希望监测该服务商的可用性
    validations:
      required: false

  - type: textarea
    id: monitor-config-template
    attributes:
      label: 监测接入配置模板（必填）
      description: >
        请按下面的模板提供一份完整的监测配置（不要在此处填写真实 API Key）。
        填写完成并提交 Issue 后，请务必通过邮箱单独发送真实 API Key：
        - 邮箱：prehisle@gmail.com
      render: yaml
      value: |
        # ----------------------------------------------------------------
        # 请直接在此模板上修改 [] 中的内容，保留引号。
        # 注意：请不要在 GitHub Issue 中填写真实 API Key。
        # 真实 Key 请通过邮箱私下发送：prehisle@gmail.com
        # ----------------------------------------------------------------
        - provider: "[服务商名称]"                  # [必填] 例如：DeepSeek, FoxCode
          provider_url: "[服务商官网]"              # [选填] 用于展示来源

          sponsor: "[赞助者名称]"                   # [必填] 你的名字或组织名
          sponsor_url: "[赞助者链接]"               # [选填] 点击名字跳转的地址 (如 linux.do 帖子)

          category: "commercial"                   # [必填] commercial(商业) 或 public(公益)

          service: "cc"                            # [必填] 服务类型: cc (Claude), cx (Codex), gm (Gemini)

          # [必填] 通道标识，格式：渠道类型-渠道来源简写
          #
          # 渠道类型：
          #   O = Official（官方）  R = Reverse（逆向）  M = Mixed（混合）
          #
          # 官方渠道来源简写：
          #   Web = 官方网页订阅（claude.ai Pro/Max 等）
          #   API = 官方 API 直连（Anthropic API）
          #   AWS = Amazon Bedrock 托管
          #   GCP = Google Vertex AI 托管
          #   App = 官方合作应用（Notion 等集成）
          #
          # 示例：O-API, O-Web, O-AWS, O-GCP, R-自定义名, M-自定义名
          # 不确定渠道类型？填 M（混合）即可
          channel: "M-[简写]"

          # [必填] 实际调用的 API Key
          # 此处可使用 sk-xxxx... 掩码，真实 Key 请通过邮箱提供
          api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

          # [必填] 接口地址 (注意区分 cc/cx/gm 的后缀)
          # cc → /v1/messages | cx → /v1/responses | gm → /v1beta/models/{model}:streamGenerateContent?alt=sse
          url: "https://api.example.com/v1/messages"
    validations:
      required: true

  - type: checkboxes
    id: confirm-key
    attributes:
      label: 确认事项
      description: 请确认以下事项后再提交 Issue
      options:
        - label: 我不会在 Issue 中填写真实 API Key
          required: true
        - label: 我会在提交 Issue 后，通过邮箱 prehisle@gmail.com 单独发送真实 API Key，并在邮件中附上本 Issue 链接
          required: true

  - type: textarea
    id: additional-info
    attributes:
      label: 其他信息
      description: 其他任何想补充的信息
