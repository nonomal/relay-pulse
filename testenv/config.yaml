interval: "5m"       # 巡检间隔，可写成 "30s"、"1m"、"5m" 等
slow_latency: "4s"   # 慢请求阈值，超过则从绿降为黄
timeout: "15s"
max_concurrency: -1  # -1无限制，未来监控增加也不受限
stagger_probes: true    # 错峰调度（在巡检周期内均匀分散探测，避免流量突发）
enable_concurrent_query: true
concurrent_query_limit: 20     # 并发查询限制
degraded_weight: 0.80 # 黄色状态的可用率权重（0-1，默认 0.7，可选）

# per-provider 覆盖
channel_details_providers:
- provider: "RelayPulse"
  expose: false    # 隐藏该 provider 的 probe_url 和 template_name
#enable_batch_query: true
enable_db_timeline_agg: false  # batch_query 关闭时无效

enable_batch_query: false      # 当前数据规模下并发小查询更快
batch_query_max_keys: 300     # 可选，默认 300

storage:
  archive:
    enabled: true
    output_dir: "/app/archive"    # 归档文件输出目录（默认 ./archive）
    format: "csv.gz"           # 归档格式（默认 csv.gz，可选 csv）
    archive_days: 35  # 归档 35 天前的数据
    backfill_days: 7  # 支持 7 天停机补齐
    schedule_hour: 19  # UTC 19:00 = 北京时间次日 03:00
    keep_days: 365             # 归档文件保留天数（默认 365，0=永久）
  retention:
    enabled: true              # 是否启用清理（默认 false，需显式开启）
    days: 42                   # 保留天数（需 >= archive_days + backfill_days - 1 = 41）
    cleanup_interval: "1h"     # 清理任务执行间隔（默认 1h）
    batch_size: 10000          # 每批删除的最大行数（默认 10000）
    max_batches_per_run: 500   # 加大批次以便尽快清理完
    startup_delay: "5s"        # 缩短延迟，尽快开始清理
    jitter: 0.2                # 调度抖动比例（默认 0.2，避免多实例同时执行）
events:
  enabled: true           # 是否启用事件功能（默认 false）
  down_threshold: 2       # 连续 N 次不可用触发 DOWN 事件（默认 2）
  up_threshold: 2         # 连续 N 次可用触发 UP 事件（默认 1）
  channel_count_mode: incremental

enable_badges: true   # 启用徽标
# 全局徽标定义（badge_definitions）
# 定义所有可复用的徽标，在 badge_providers 或 monitors.badges 中通过 id 引用
badge_definitions:
  # API Key 来源类徽标
  api_key_user:
    kind: "source"       # 类型：source(来源)/info(信息)/feature(功能特性)
    variant: "info"      # 样式：default(灰)/success(绿)/warning(黄)/danger(红)/info(蓝)


# 自助测试功能配置
selftest:
  enabled: true                  # 启用自助测试功能（用于 Playwright 测试）
  max_concurrent: 10             # 最大并发测试数
  max_queue_size: 50             # 最大排队数量
  job_timeout: "30s"             # 单个测试超时时间
  result_ttl: "2m"               # 测试结果保留时间
  rate_limit_per_minute: 10      # 每个 IP 每分钟最多请求数

# 热板/冷板配置
boards:
  enabled: true         # 是否启用热板/冷板功能
  auto_move:
    enabled: true              # 启用自动移板
    threshold_down: 50.0       # hot 板可用率低于 50% → 降级到 secondary
    threshold_up: 55.0         # secondary 板可用率达到 55% → 升回 hot
    check_interval: "30m"      # 评估间隔
    min_probes: 10             # 最少探测次数（不足则跳过，保护新服务商）

# 赞助商置顶配置
sponsor_pin:
  enabled: true          # 是否启用置顶功能
  max_pinned: 9          # 最多置顶数量, 服务数*3
  min_uptime: 92.0       # 最低可用率要求
  min_level: "beacon"     # 最低赞助级别

announcements:
  enabled: true
  owner: "prehisle"
  repo: "relay-pulse"
  category_name: "Announcements"
  poll_interval: "15m"
  window_hours: 72

github:
  # token 通过环境变量 GITHUB_TOKEN 设置
  # 代理可选，国内服务器需要（密码中的 # 需要 URL 编码为 %23）
  proxy: 'socks5://yjxt:%23%23%23LLM_GATAWAY%23%23%23@69.63.208.74:3339'

# 风险服务商配置（provider 级别）
# 用于标记存在风险的服务商，风险徽标会自动显示在该服务商的所有监控项上
risk_providers:
- provider: "AICodeMirror"
  risks:
  - label: "疑似模型掺假，移入冷版"
    discussion_url: "https://github.com/prehisle/relay-pulse/discussions/66"
disabled_providers:
- provider: "augmunt"
  reason: "目前的研发排期无法支持基础的追踪参数（Affiliate/Ref），且落地页>的用户体验未达到平台新版的收录标准https://linux.do/t/topic/1247420/178?page=2"
- provider: "Elysiver"
  reason: "公益站主动屏蔽key"
- provider: "Runanytime"
  reason: "公益站主动屏蔽key"


hidden_providers:
- provider: "augmunt"
  reason: "目前的研发排期无法支持基础的追踪参数（Affiliate/Ref），且落地页的用户体验未达到平台新版的收录标准"

